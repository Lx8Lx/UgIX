<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UgIx - أقوى موقع بالعالم</title>
  
  <!-- مكتبات أساسية -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

  <style>
    /* إعدادات عامة */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
      user-select: none;
    }
    
    body {
      background: #000;
      overflow: hidden;
    }

    /* شاشة التحميل */
    #preloader {
      position: fixed;
      width: 100%;
      height: 100vh;
      background: linear-gradient(135deg, #1e1e2f, #2a2a3d);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      color: #fff;
      z-index: 99999;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 5px solid #fff;
      border-top: 5px solid #ffd700;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* مشهد ثلاثي الأبعاد */
    #bgCanvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: -1;
    }

    /* الواجهة */
    .ui-container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(15px);
      padding: 30px;
      border-radius: 10px;
      text-align: center;
      color: white;
    }

    .logo {
      font-size: 40px;
      font-weight: bold;
      color: #ffd700;
      text-shadow: 0 0 10px rgba(255, 215, 0, 0.7);
    }

    .downloadBtn {
      display: block;
      width: 200px;
      margin: 15px auto;
      padding: 10px;
      background: #ffd700;
      color: #000;
      border: none;
      border-radius: 5px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .downloadBtn:hover {
      transform: scale(1.05);
      background: #ffbb00;
    }
  </style>
</head>

<body>
  <!-- شاشة التحميل -->
  <div id="preloader">
    <h1>جاري تحميل أقوى موقع...</h1>
    <div class="spinner"></div>
  </div>

  <!-- خلفية ثلاثية الأبعاد -->
  <canvas id="bgCanvas"></canvas>

  <!-- الواجهة -->
  <div class="ui-container">
    <div class="logo">UgIx</div>
    <p>أقوى موقع تحميل بتقنيات مذهلة</p>
    <button class="downloadBtn" onclick="startDownload('app1')">تحميل التطبيق 1</button>
    <button class="downloadBtn" onclick="startDownload('app2')">تحميل التطبيق 2</button>
  </div>

  <script>
    /* إعداد مشهد ثلاثي الأبعاد */
    let scene, camera, renderer, sphere;

    function init3D() {
      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.z = 10;

      renderer = new THREE.WebGLRenderer({ canvas: document.getElementById("bgCanvas"), alpha: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);

      const geometry = new THREE.SphereGeometry(3, 64, 64);
      const material = new THREE.MeshStandardMaterial({ color: 0xffd700, metalness: 0.8, roughness: 0.3 });
      sphere = new THREE.Mesh(geometry, material);
      scene.add(sphere);

      const light = new THREE.PointLight(0xffffff, 1.2);
      light.position.set(5, 5, 5);
      scene.add(light);

      animate();
    }

    function animate() {
      requestAnimationFrame(animate);
      sphere.rotation.y += 0.01;
      renderer.render(scene, camera);
    }

    /* تحميل الصفحة */
    window.addEventListener("load", () => {
      init3D();
      document.getElementById("preloader").style.display = "none";
    });

    /* تحميل التطبيق */
    function startDownload(app) {
      alert("جارٍ تحميل " + app);
    }
  </script>
</body>
</html>
