<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>UgIx - أقوى موقع بالعالم</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* RESET */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Arial", sans-serif;
    }
    body {
      overflow: hidden;
    }

    /* شاشة التحميل */
    #preloader {
      position: fixed;
      width: 100%;
      height: 100vh;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      color: #fff;
      z-index: 9999;
    }
    #preloader h1 {
      font-size: 24px;
      margin-bottom: 20px;
    }
    #enterBtn {
      padding: 15px 30px;
      background: #8a2be2;
      color: #fff;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
    }
    #enterBtn:hover {
      background: #6a1bb7;
    }

    /* المحتوى الرئيسي */
    #mainContent {
      display: none; /* مخفي في البداية */
      width: 100%;
      height: 100vh;
      background: linear-gradient(135deg, #000, #4b0082);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 24px;
    }
  </style>
</head>
<body>

  <!-- شاشة التحميل -->
  <div id="preloader">
    <h1>جاري إعداد أقوى موقع بالعالم...</h1>
    <button id="enterBtn">دخول</button>
  </div>

  <!-- المحتوى الرئيسي -->
  <div id="mainContent">
    أهلاً بك في موقع UgIx!
  </div>

  <script>
    // زر الدخول
    document.getElementById("enterBtn").addEventListener("click", function() {
      document.getElementById("preloader").style.display = "none";
      document.getElementById("mainContent").style.display = "flex";
    });
  </script>

</body>
</html>
