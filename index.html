<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>UgIx - أقوى موقع بالعالم</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* RESET */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Arial", sans-serif;
    }
    body {
      overflow: hidden;
      background: #000;
    }

    /* شاشة التحميل */
    #preloader {
      position: fixed;
      width: 100%;
      height: 100vh;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      color: #fff;
      z-index: 9999;
      transition: opacity 0.5s ease-out, visibility 0s linear 0.5s;
    }
    #preloader h1 {
      font-size: 24px;
      margin-bottom: 20px;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 5px solid #fff;
      border-top: 5px solid #8a2be2;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    #enterBtn {
      margin-top: 20px;
      padding: 15px 30px;
      background: #8a2be2;
      color: #fff;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
    }
    #enterBtn:hover {
      background: #6a1bb7;
    }

    /* المحتوى الرئيسي */
    #mainContent {
      position: fixed;
      width: 100%;
      height: 100vh;
      background: linear-gradient(135deg, #000, #4b0082);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 24px;
      opacity: 0;
      visibility: hidden;
      transition: opacity 1s ease-in-out, visibility 0s linear 1s;
    }
  </style>
</head>
<body>

  <!-- شاشة التحميل -->
  <div id="preloader">
    <h1>جاري إعداد أقوى موقع بالعالم...</h1>
    <div class="spinner"></div>
    <button id="enterBtn">دخول</button>
  </div>

  <!-- المحتوى الرئيسي -->
  <div id="mainContent">
    أهلاً بك في موقع UgIx! 🔥
  </div>

  <script>
    document.getElementById("enterBtn").addEventListener("click", function() {
      let preloader = document.getElementById("preloader");
      let mainContent = document.getElementById("mainContent");

      // تخفيف شفافية شاشة التحميل ثم إخفاؤها
      preloader.style.opacity = "0";
      setTimeout(() => {
        preloader.style.visibility = "hidden";
        mainContent.style.opacity = "1";
        mainContent.style.visibility = "visible";
      }, 500);
    });
  </script>

</body>
</html>
