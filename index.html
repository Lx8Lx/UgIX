<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <title>UgIx - أقوى موقع بالعالم</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.5/ScrollTrigger.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      font-family: "Arial", sans-serif;
    }
    body {
      overflow: hidden;
      background: #000;
    }

    /* شاشة التحميل */
    #preloader {
      position: fixed;
      width: 100%;
      height: 100vh;
      background: linear-gradient(135deg, #0a0a1a, #12122a);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      color: #fff;
      z-index: 99999;
    }
    #preloader h1 {
      font-size: 26px;
      margin-bottom: 20px;
      text-align: center;
    }
    .spinner {
      width: 60px;
      height: 60px;
      border: 6px solid #fff;
      border-top: 6px solid #00bcd4;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    #enterBtn {
      margin-top: 20px;
      padding: 15px 30px;
      background: #00bcd4;
      color: #000;
      font-size: 18px;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
    }
    #enterBtn:hover {
      transform: scale(1.05);
      background: #0097a7;
    }

    /* خلفية ثلاثية الأبعاد */
    #bgCanvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: -1;
    }

    /* المحتوى الرئيسي */
    #mainContent {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: none;
    }

    /* واجهة المستخدم */
    .ui-container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 400px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(15px);
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(0, 188, 212, 0.3);
      text-align: center;
      padding: 30px;
      color: #fff;
    }
    .logo {
      font-size: 40px;
      font-weight: bold;
      color: #00bcd4;
      margin-bottom: 10px;
      text-shadow: 0 0 10px rgba(0, 188, 212, 0.7);
    }
    .subtitle {
      font-size: 16px;
      margin-bottom: 20px;
      opacity: 0.9;
    }

    /* أزرار التحميل */
    .downloadBtn {
      display: block;
      width: 80%;
      margin: 15px auto;
      padding: 15px;
      background: linear-gradient(90deg, #00e5ff, #0097a7);
      color: #000;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.3s;
      box-shadow: 0 5px 15px rgba(0, 188, 212, 0.6);
    }
    .downloadBtn:hover {
      transform: scale(1.05);
    }

    /* صندوق الإشعار */
    #popup {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.8);
      color: #fff;
      padding: 15px 25px;
      border-radius: 10px;
      box-shadow: 0 0 20px rgba(0, 188, 212, 0.5);
      font-size: 18px;
      display: none;
      z-index: 9999;
    }
  </style>
</head>
<body>
  <div id="preloader">
    <h1>جاري إعداد أقوى موقع بالعالم...</h1>
    <div class="spinner"></div>
    <button id="enterBtn">دخول</button>
  </div>

  <canvas id="bgCanvas"></canvas>

  <div id="mainContent">
    <div class="ui-container">
      <div class="logo">UgIx</div>
      <div class="subtitle">أقوى موقع تحميل بتقنيات تفوق الخيال</div>

      <button class="downloadBtn" onclick="startDownload('delta')">تحميل Delta</button>
      <button class="downloadBtn" onclick="startDownload('codex')">تحميل Codex</button>

      <div id="popup">جارٍ بدء التحميل...</div>
    </div>
  </div>

  <script>
    function startDownload(app) {
      const popup = document.getElementById("popup");
      popup.style.display = "block";

      setTimeout(() => {
        popup.style.display = "none";
        alert("تم بدء تحميل " + app);
      }, 2000);
    }

    const preloader = document.getElementById("preloader");
    const enterBtn = document.getElementById("enterBtn");
    const mainContent = document.getElementById("mainContent");

    enterBtn.addEventListener("click", () => {
      preloader.style.display = "none";
      mainContent.style.display = "block";
    });
  </script>
</body>
</html>
