<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <title>UgIx - أقوى موقع تحميل بالعالم</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- ثلاثية الأبعاد -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <!-- مكتبة التحريك GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.5/gsap.min.js"></script>
  <style>
    * {
      margin: 0; 
      padding: 0; 
      box-sizing: border-box;
      user-select: none;
      font-family: "Arial", sans-serif;
    }
    body {
      background: #000; 
      overflow: hidden;
    }

    #preloader {
      position: fixed;
      width: 100%;
      height: 100vh;
      background: linear-gradient(135deg, #1e1e2f, #2a2a3d);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      flex-direction: column;
    }
    #preloader h1 {
      color: #fff;
      margin-bottom: 20px;
      font-size: 28px;
    }
    .spinner {
      width: 60px;
      height: 60px;
      border: 6px solid #fff;
      border-top: 6px solid #ffd700;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0%   { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    #enterBtn {
      margin-top: 30px;
      padding: 15px 30px;
      font-size: 18px;
      font-weight: bold;
      color: #000;
      background: #ffd700;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
    }
    #enterBtn:hover {
      background: #ffbb00;
      transform: scale(1.05);
    }

    #mainContent {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: none;
      pointer-events: none;
    }

    .content-container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) perspective(1000px);
      width: 400px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
      backdrop-filter: blur(10px);
      padding: 30px;
      text-align: center;
      color: #fff;
    }

    .logo {
      font-size: 36px;
      color: #ffd700;
      text-shadow: 0 0 10px #ffd700;
      margin-bottom: 10px;
      font-weight: bold;
    }
    .subTitle {
      font-size: 16px;
      margin-bottom: 20px;
      opacity: 0.8;
    }

    .downloadBtn {
      display: block;
      width: 80%;
      margin: 10px auto;
      padding: 15px;
      background: linear-gradient(90deg, #ffdd00, #ffaa00);
      border: none;
      border-radius: 10px;
      color: #000;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.3s;
    }
    .downloadBtn:hover {
      transform: scale(1.05);
    }

    .social {
      margin-top: 20px;
      padding: 10px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 8px;
    }
    .social a {
      color: #fff;
      text-decoration: none;
      font-weight: bold;
      font-size: 16px;
      transition: 0.3s;
    }
    .social a:hover {
      color: #ffd700;
    }
  </style>
</head>
<body>

<div id="preloader">
  <h1>جاري إعداد أقوى موقع بالعالم...</h1>
  <div class="spinner"></div>
  <button id="enterBtn">دخول</button>
</div>

<canvas id="bgCanvas"></canvas>

<div id="mainContent">
  <div class="content-container">
    <div class="logo">UgIx</div>
    <div class="subTitle">أقوى موقع تحميل بتقنيات ثلاثية الأبعاد ومؤثرات مذهلة</div>

    <button class="downloadBtn" onclick="startDownload('delta')">تحميل Delta</button>
    <button class="downloadBtn" onclick="startDownload('codex')">تحميل Codex</button>

    <div class="social">
      <a href="https://t.me/Lx8Lx">تيليجرام: Lx8Lx</a> | 
      <a href="https://t.me/po_ff">قناة: po_ff</a>
    </div>
  </div>
</div>

<script>
const encryptedLinks = {
  "delta": "aXRtcy1zZXJ2aWNlczovLz9hY3Rpb249ZG93bmxvYWQtbWFuaWZlc3QmdXJsPWh0dHBzOi8vZGVsdGFpb3MtZXhlY3V0b3IuY29tL0luc3RhbGwucGxpc3Q=",
  "codex": "aXRtcy1zZXJ2aWNlczovLz9hY3Rpb249ZG93bmxvYWQtbWFuaWZlc3QmdXJsPWh0dHBzOi8vY29kZXgtaW9zLmNvbS9JbnN0YWxsLnBsaXN0"
};

function decodeBase64(str) {
  return atob(str);
}

function startDownload(app) {
  const realLink = decodeBase64(encryptedLinks[app]);
  window.location.href = realLink;
}

document.getElementById("enterBtn").addEventListener("click", () => {
  document.getElementById("preloader").style.display = "none";
  document.getElementById("mainContent").style.display = "block";
});
</script>
</body>
</html>
