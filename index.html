<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>UgIx - أقوى موقع بالعالم</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- مكتبات 3D و تحريك -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.5/ScrollTrigger.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Arial", sans-serif; }
    body { overflow: hidden; background: #000; color: #fff; }

    /* شاشة تحميل احترافية */
    #preloader {
      position: fixed; width: 100%; height: 100vh; background: linear-gradient(135deg, #1e1e2f, #2a2a3d);
      display: flex; align-items: center; justify-content: center; flex-direction: column; z-index: 9999;
    }
    .spinner {
      width: 60px; height: 60px; border: 6px solid #fff; border-top: 6px solid #ffd700;
      border-radius: 50%; animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    #enterBtn {
      margin-top: 20px; padding: 15px 30px; background: #ffd700;
      color: #000; font-size: 18px; font-weight: bold;
      border: none; border-radius: 8px; cursor: pointer;
      transition: 0.3s; box-shadow: 0px 0px 15px rgba(255, 215, 0, 0.5);
    }
    #enterBtn:hover { transform: scale(1.1); background: #ffbb00; }

    /* مشهد ثلاثي الأبعاد */
    #bgCanvas { position: fixed; top: 0; left: 0; z-index: -1; }

    /* واجهة شفافة زجاجية */
    .ui-container {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 450px; padding: 30px;
      background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px);
      border-radius: 15px; text-align: center;
      box-shadow: 0px 0px 20px rgba(255, 215, 0, 0.3);
    }
    .logo { font-size: 45px; font-weight: bold; color: #ffd700; margin-bottom: 10px; text-shadow: 0px 0px 10px rgba(255, 215, 0, 0.7); }
    .subtitle { font-size: 18px; opacity: 0.9; }

    /* أزرار التحميل */
    .downloadBtn {
      display: block; width: 80%; margin: 15px auto;
      padding: 15px; font-size: 18px; font-weight: bold;
      background: linear-gradient(90deg, #ffdd00, #ffaa00);
      color: #000; border: none; border-radius: 10px;
      cursor: pointer; position: relative; overflow: hidden;
      transition: transform 0.3s; box-shadow: 0px 5px 15px rgba(255, 136, 0, 0.6);
    }
    .downloadBtn:hover { transform: scale(1.05); }
    .downloadBtn:active { transform: scale(0.95); }

  </style>
</head>
<body>
  <!-- شاشة التحميل -->
  <div id="preloader">
    <h1>جاري إعداد أقوى موقع بالعالم...</h1>
    <div class="spinner"></div>
    <button id="enterBtn">دخول</button>
  </div>

  <!-- خلفية ثلاثية الأبعاد -->
  <canvas id="bgCanvas"></canvas>

  <!-- المحتوى الرئيسي -->
  <div class="ui-container" id="uiContainer">
    <div class="logo">UgIx</div>
    <div class="subtitle">أقوى موقع تحميل بتقنيات تفوق الخيال</div>

    <!-- أزرار التحميل -->
    <button class="downloadBtn" onclick="startDownload('delta')">تحميل Delta</button>
    <button class="downloadBtn" onclick="startDownload('codex')">تحميل Codex</button>
  </div>

  <script>
    /* 1) إعداد مشهد Three.js */
    let scene, camera, renderer, sphere;
    function init3D() {
      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(0, 0, 25);

      renderer = new THREE.WebGLRenderer({ canvas: document.getElementById("bgCanvas"), alpha: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(window.devicePixelRatio);

      // كرة ذهبية
      const geometry = new THREE.SphereGeometry(5, 64, 64);
      const material = new THREE.MeshStandardMaterial({
        color: 0xffd700, emissive: 0x222222, roughness: 0.2, metalness: 0.9
      });
      sphere = new THREE.Mesh(geometry, material);
      scene.add(sphere);

      // إضاءة
      const light = new THREE.PointLight(0xffffff, 1.5);
      light.position.set(10, 10, 10);
      scene.add(light);
      scene.add(new THREE.AmbientLight(0xffffff, 0.1));

      animate();
    }
    function animate() {
      requestAnimationFrame(animate);
      sphere.rotation.y += 0.005;
      renderer.render(scene, camera);
    }
    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    /* 2) شاشة التحميل */
    document.getElementById("enterBtn").addEventListener("click", () => {
      document.getElementById("preloader").style.display = "none";
      gsap.from("#uiContainer", { duration: 1.5, y: -100, opacity: 0, ease: "power3.out" });
    });

    /* 3) تحميل الملفات */
    function startDownload(app) {
      alert(`جارٍ تحميل ${app}`);
    }

    /* 4) بدء المشهد */
    window.addEventListener("load", init3D);
  </script>
</body>
</html>
