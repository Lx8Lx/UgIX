<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UgIX - أقوى تحميل</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: linear-gradient(to right, #000428, #004e92);
            color: white;
            padding: 50px;
        }
        .container {
            max-width: 600px;
            margin: auto;
        }
        .download-btn {
            background-color: #ff6600;
            color: white;
            padding: 15px;
            margin: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 18px;
        }
        .download-btn:hover {
            background-color: #ff4500;
        }
        .popup {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .popup-content {
            background: white;
            color: black;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            font-size: 20px;
        }
        .popup button {
            background: #ff6600;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
    </style>
    <script>
        function showPopup() {
            document.getElementById("popup").style.display = "flex";
        }
        function closePopup() {
            document.getElementById("popup").style.display = "none";
        }
    </script>
</head>
<body>
    <div class="container">
        <h1>مرحبًا بك في UgIX</h1>
        <p>أفضل مصدر لتنزيل التطبيقات بأمان!</p>
        
        <button class="download-btn" onclick="showPopup()">تحميل دلتا</button>
        <button class="download-btn" onclick="showPopup()">تحميل كوديكس</button>
    </div>

    <div id="popup" class="popup">
        <div class="popup-content">
            <p>⚡ اشترك في قناة تيليجرام <b>@po_ff</b> للحصول على التحديثات!</p>
            <button onclick="closePopup()">حسنًا</button>
        </div>
    </div>
</body>
</html>
